name: Build and Release FluxRoute

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content .\FluxRoute\FluxRoute.csproj
          $ver = $csproj.Project.PropertyGroup.Version
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "TAG=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Version: $ver, Tag: v$ver"

      - name: Restore solution
        run: dotnet restore .\FluxRoute.slnx

      - name: Publish win-x64
        run: dotnet publish .\FluxRoute\FluxRoute.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o .\publish-x64

      - name: Publish win-x86
        run: dotnet publish .\FluxRoute\FluxRoute.csproj -c Release -r win-x86 --self-contained true -p:PublishSingleFile=true -o .\publish-x86

      - name: Create ZIPs
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          Compress-Archive -Path .\publish-x64\* -DestinationPath ".\FluxRoute-$tag-win-x64.zip" -Force
          Compress-Archive -Path .\publish-x86\* -DestinationPath ".\FluxRoute-$tag-win-x86.zip" -Force

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $zipX64 = ".\FluxRoute-$tag-win-x64.zip"
          $zipX86 = ".\FluxRoute-$tag-win-x86.zip"

          gh release view $tag --repo "$env:GITHUB_REPOSITORY" *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zipX64 $zipX86 --clobber --repo "$env:GITHUB_REPOSITORY"
          }
          else {
            gh release create $tag $zipX64 $zipX86 `
              --title "FluxRoute Desktop $tag" `
              --generate-notes `
              --target "${{ github.ref_name }}" `
              --repo "$env:GITHUB_REPOSITORY"
          }
